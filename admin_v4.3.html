<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huerta de Control | El Otro Huerto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #F8F9F5; --white: #FFFFFF; --accent: #4A5D23; --text: #1C1C1E; --muted: #6E6E73; --border: #E5E5E1; --success: #28CD41; --danger: #D93025; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

        /* LOGIN PROFESIONAL CENTRADO */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--white); padding: 48px 32px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 360px; border: 1px solid var(--border); }
        .login-card h2 { font-family: 'Lora', serif; font-size: 26px; margin: 0 0 8px; }
        .login-card p { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
        .login-input { width: 100%; padding: 16px; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 16px; text-align: center; font-size: 16px; outline: none; background: #FAFAFA; box-sizing: border-box; transition: 0.3s; }
        .login-input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 4px rgba(74, 93, 35, 0.05); }
        .login-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; font-size: 16px; }
        #error-msg { color: var(--danger); font-size: 13px; margin-top: 16px; font-weight: 500; min-height: 20px; }

        /* DASHBOARD */
        #admin-content { display: none; padding: 40px 24px; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .kpi-card { background: #fff; padding: 24px; border-radius: 20px; border: 1px solid var(--border); }
        .kpi-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .kpi-value { font-size: 32px; font-weight: 700; color: var(--accent); margin: 8px 0; }
        
        .main-layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 32px; }
        .card { background: #fff; border-radius: 24px; padding: 28px; border: 1px solid var(--border); margin-bottom: 32px; }
        h3 { font-family: 'Lora', serif; font-size: 20px; margin: 0 0 20px 0; color: var(--accent); border-left: 4px solid var(--accent); padding-left: 15px; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 12px; color: var(--muted); border-bottom: 2px solid var(--bg); font-weight: 600; text-transform: uppercase; font-size: 10px; }
        td { padding: 14px 12px; border-bottom: 1px solid #f9f9f9; }
        .picking-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed var(--border); }
        .picking-qty { font-weight: 700; color: var(--accent); background: #F0F2EB; padding: 2px 10px; border-radius: 6px; }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2>El Otro Huerto</h2>
            <p>Panel Administrativo V4.4</p>
            <input type="password" id="pass-field" class="login-input" placeholder="Clave Maestra" autofocus>
            <button class="login-btn" onclick="checkAccess()">Ingresar al Huerto</button>
            <div id="error-msg"></div>
        </div>
    </div>

    <div id="admin-content">
        <header>
            <div>
                <h1 style="font-family:'Lora';">Huerta de Control</h1>
                <p style="color:var(--muted); margin:4px 0;">Reporting & Auditoría de Operaciones</p>
            </div>
            <button onclick="fetchData()" style="background:white; border: 1px solid var(--border); padding: 12px 20px; border-radius: 14px; cursor:pointer; font-weight:600;">🔄 Sincronizar Datos</button>
        </header>

        <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-label">Ventas Mes (MTD)</div><div class="kpi-value" id="kpi-mtd">$0</div></div>
            <div class="kpi-card"><div class="kpi-label">Margen Neto Real</div><div class="kpi-value" id="kpi-margin">$0</div></div>
            <div class="kpi-card"><div class="kpi-label">Pedidos Totales</div><div class="kpi-value" id="kpi-qty">0</div></div>
            <div class="kpi-card"><div class="kpi-label">Ticket Promedio</div><div class="kpi-value" id="kpi-avg">$0</div></div>
        </div>

        <div class="main-layout">
            <div class="left-col">
                <div class="card">
                    <h3>📦 Registro de Pedidos (Últimos 13)</h3>
                    <div style="overflow-x: auto;">
                        <table id="orders-table">
                            <thead><tr><th>Fecha</th><th>Cliente</th><th>Total</th><th>Pago</th><th>Logística</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="right-col">
                <div class="card">
                    <h3>🧺 Picking List (Cosecha Jueves)</h3>
                    <div id="picking-list"></div>
                </div>
                <div class="card">
                    <h3>📊 Mix de Ventas</h3>
                    <canvas id="productsChart"></canvas>
                </div>
            </div>
        </div>
    </div>

<script>
    const _0xkey = "RU9IMjAyNg=="; // EOH2026
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzr4xUDOZtACKNZgdHoUbvd3VMwuY7Reuj8KL2bRMEgtSoEwBrzuhqElqC-sWObuhVg/exec';

    document.getElementById('pass-field').addEventListener('keypress', e => { if (e.key === 'Enter') checkAccess(); });

    function checkAccess() {
        if (btoa(document.getElementById('pass-field').value) === _0xkey) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            fetchData();
        } else {
            const msgs = ["⚠️ Esa clave no brotó.","⚠️ Tierra seca en la contraseña.","⚠️ ¡Plaga detectada! Clave incorrecta."];
            document.getElementById('error-msg').innerText = msgs[Math.floor(Math.random()*msgs.length)];
            document.getElementById('pass-field').value = "";
        }
    }

    async function fetchData() {
        try {
            // USAMOS REDIRECCIÓN PARA SOLUCIONAR CORS
            const res = await fetch(`${SCRIPT_URL}?action=getAdminData`, { redirect: 'follow' });
            const data = await res.json();
            
            // MAPEO FLEXIBLE: Tu script actual devuelve { pedidos: [...], productos: [...] }
            const pedidos = data.pedidos || [];
            const productos = data.productos || [];
            
            const costosMap = {};
            productos.forEach(p => {
                const nombre = p.nombre || p.Nombre || "";
                const costo = p.costo || p.Costo || 0;
                costosMap[nombre.trim()] = Number(costo);
            });

            renderDashboard(pedidos, costosMap);
        } catch (e) { 
            console.error("Error cargando datos:", e);
            document.querySelector('#orders-table tbody').innerHTML = '<tr><td colspan="5" style="color:red; text-align:center;">Error al conectar con Google Sheets. Asegúrate de que el Script esté publicado correctamente.</td></tr>';
        }
    }

    function renderDashboard(pedidos, costosMap) {
        let totalBruto = 0, margenNeto = 0;
        const tbody = document.querySelector('#orders-table tbody');
        tbody.innerHTML = '';
        const picking = {};

        pedidos.slice().reverse().forEach(p => {
            const total = Number(p.total || p.Total || 0);
            const comision = Number(p.comision_mp || p.Comision_MP || 0);
            const fecha = p.fecha || p.Fecha || "---";
            const nombre = p.nombre || p.Nombre || "Sin nombre";
            const pago = p.estado_pago || p.Estado_Pago || "Pendiente";
            const detalle = p.detalle || p.Detalle || "";
            const logistica = p.logistica || p.Logistica || "Retiro";

            totalBruto += total;
            let costoPedido = 0;

            const matches = detalle.match(/(\d+)x ([^|]+)/g);
            if (matches) {
                matches.forEach(m => {
                    const parts = m.split('x ');
                    const qty = parseInt(parts[0]);
                    const item = parts[1].trim();
                    picking[item] = (picking[item] || 0) + qty;
                    if(costosMap[item]) costoPedido += (costosMap[item] * qty);
                });
            }
            
            margenNeto += (total - comision - costoPedido);

            tbody.innerHTML += `<tr><td>${fecha.split(' ')[0]}</td><td><strong>${nombre}</strong></td><td>$${total.toLocaleString('es-CL')}</td><td>${pago}</td><td>${logistica}</td></tr>`;
        });

        document.getElementById('kpi-mtd').innerText = `$${totalBruto.toLocaleString('es-CL')}`;
        document.getElementById('kpi-margin').innerText = `$${Math.floor(margenNeto).toLocaleString('es-CL')}`;
        document.getElementById('kpi-qty').innerText = pedidos.length;
        document.getElementById('kpi-avg').innerText = `$${Math.floor(totalBruto/pedidos.length).toLocaleString('es-CL')}`;

        renderPickingList(picking);
        renderChart(picking);
    }

    function renderPickingList(picking) {
        const container = document.getElementById('picking-list');
        container.innerHTML = '';
        Object.entries(picking).sort((a,b) => b[1] - a[1]).forEach(([n, q]) => {
            container.innerHTML += `<div class="picking-item"><span>${n}</span><span class="picking-qty">${q}</span></div>`;
        });
    }

    function renderChart(picking) {
        const ctx = document.getElementById('productsChart').getContext('2d');
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(picking).slice(0, 5).map(l => l.substring(0,12)),
                datasets: [{ data: Object.values(picking).slice(0, 5), backgroundColor: '#4A5D23', borderRadius: 8 }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { grid: { display: false } } } }
        });
    }
</script>
</body>
</html>
