<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <title>Huerta de Control | El Otro Huerto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #F8F9F5; --white: #FFFFFF; --accent: #4A5D23; --text: #1C1C1E; --muted: #6E6E73; --border: #E5E5E1; --success: #28CD41; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--white); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center; border: 1px solid var(--border); width: 320px; }
        .login-input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; text-align: center; font-size: 16px; outline: none; }
        .login-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        #admin-content { display: none; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--white); padding: 24px; border-radius: 20px; border: 1px solid var(--border); }
        .kpi-value { font-size: 30px; font-weight: 700; color: var(--accent); margin: 8px 0; }

        .main-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .card { background: var(--white); border-radius: 24px; padding: 24px; border: 1px solid var(--border); margin-bottom: 30px; }
        h3 { font-family: 'Lora', serif; margin-top: 0; font-size: 20px; color: var(--accent); }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 12px; color: var(--muted); border-bottom: 2px solid var(--bg); }
        td { padding: 12px; border-bottom: 1px solid #f9f9f9; }

        .picking-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed var(--border); }
        .picking-qty { font-weight: 700; color: var(--accent); background: #F0F2EB; padding: 2px 10px; border-radius: 6px; }

        #map { width: 100%; height: 300px; border-radius: 16px; background: #eee; border: 1px solid var(--border); }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB1CcdwY-opGXS-a9m30PxcPPYcOa4L6wE"></script>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-family:'Lora'">El Otro Huerto</h2>
            <input type="password" id="pass-field" class="login-input" placeholder="EOH2026">
            <button class="login-btn" onclick="checkAccess()">Ingresar</button>
        </div>
    </div>

    <div id="admin-content">
        <header>
            <div><h1>Huerta de Control</h1><p style="color:var(--muted);">Gestión Inteligente V4.3.3</p></div>
            <button onclick="fetchData()" style="background:white; border: 1px solid var(--border); padding: 10px 20px; border-radius: 12px; cursor:pointer; font-weight:600;">🔄 Sincronizar</button>
        </header>

        <div class="kpi-grid">
            <div class="kpi-card"><div>Venta Acumulada</div><div class="kpi-value" id="kpi-total">$0</div></div>
            <div class="kpi-card"><div>Últimos 7 Días</div><div class="kpi-value" id="kpi-week">$0</div></div>
            <div class="kpi-card"><div>Utilidad Est.</div><div class="kpi-value" id="kpi-margin">$0</div></div>
            <div class="kpi-card"><div>Total Pedidos</div><div class="kpi-value" id="kpi-qty">0</div></div>
        </div>

        <div class="main-layout">
            <div class="left-col">
                <div class="card">
                    <h3>📦 Registro de Órdenes</h3>
                    <div style="overflow-x: auto;"><table id="orders-table"><thead><tr><th>Fecha</th><th>Cliente</th><th>Total</th><th>Estado</th></tr></thead><tbody></tbody></table></div>
                </div>
                <div class="card">
                    <h3>📍 Mapa de Despachos</h3>
                    <div id="map"></div>
                </div>
            </div>
            <div class="right-col">
                <div class="card"><h3>🧺 Picking List (Cosecha)</h3><div id="picking-list"></div></div>
                <div class="card"><h3>📊 Mix de Productos</h3><canvas id="productsChart"></canvas></div>
            </div>
        </div>
    </div>

<script>
    const _0xkey = "RU9IMjAyNg=="; 
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzr4xUDOZtACKNZgdHoUbvd3VMwuY7Reuj8KL2bRMEgtSoEwBrzuhqElqC-sWObuhVg/exec';
    let map;

    function checkAccess() {
        if (btoa(document.getElementById('pass-field').value) === _0xkey) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            initMap();
            fetchData();
        }
    }

    function initMap() {
        const plazaLilas = { lat: -33.433299, lng: -70.598064 };
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 14,
            center: plazaLilas,
            styles: [{ "featureType": "all", "stylers": [{ "saturation": -100 }, { "lightness": 45 }] }]
        });
    }

    async function fetchData() {
        try {
            const response = await fetch(`${SCRIPT_URL}?action=getAdminData`);
            const data = await response.json();
            if (data && data.pedidos) processData(data.pedidos);
        } catch (e) { console.error("Error cargando datos:", e); }
    }

    function processData(pedidos) {
        let total = 0, week = 0, margin = 0;
        const now = new Date(), lastWeek = new Date(now.getTime() - 7*24*60*60*1000);
        const tbody = document.querySelector('#orders-table tbody');
        tbody.innerHTML = '';
        const picking = {};

        pedidos.slice().reverse().forEach(p => {
            const v = Number(p.total || 0);
            const c = Number(p.comision_mp || 0);
            const dParts = (p.fecha || "").split(' ')[0].split('/');
            const vDate = dParts.length === 3 ? new Date(dParts[2], dParts[1]-1, dParts[0]) : new Date();

            total += v;
            if (vDate >= lastWeek) week += v;
            margin += (v - c);

            tbody.innerHTML += `<tr><td>${p.fecha || ''}</td><td><strong>${p.nombre || ''}</strong></td><td>$${v.toLocaleString('es-CL')}</td><td>${p.estado_pago || ''}</td></tr>`;

            // Lógica de Picking
            const matches = (p.detalle || "").match(/(\d+)x ([^|]+)/g);
            if (matches) {
                matches.forEach(m => {
                    const p = m.split('x ');
                    const name = p[1].split('|')[0].trim();
                    picking[name] = (picking[name] || 0) + parseInt(p[0]);
                });
            }
        });

        document.getElementById('kpi-total').innerText = `$${total.toLocaleString('es-CL')}`;
        document.getElementById('kpi-week').innerText = `$${week.toLocaleString('es-CL')}`;
        document.getElementById('kpi-margin').innerText = `$${Math.floor(margin).toLocaleString('es-CL')}`;
        document.getElementById('kpi-qty').innerText = pedidos.length;

        renderPicking(picking);
        renderChart(picking);
    }

    function renderPicking(counts) {
        const container = document.getElementById('picking-list');
        container.innerHTML = '';
        Object.entries(counts).sort((a,b) => b[1]-a[1]).forEach(([n, q]) => {
            container.innerHTML += `<div class="picking-item"><span>${n}</span><span class="picking-qty">${q} un.</span></div>`;
        });
    }

    function renderChart(counts) {
        const ctx = document.getElementById('productsChart').getContext('2d');
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: Object.keys(counts).slice(0,6), datasets: [{ data: Object.values(counts).slice(0,6), backgroundColor: '#4A5D23', borderRadius: 6 }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { grid: { display: false } } } }
        });
    }
</script>
</body>
</html>
