<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <title>Huerta de Control | V4.6</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #F8F9F5; --white: #FFFFFF; --accent: #4A5D23; --text: #1C1C1E; --muted: #6E6E73; --border: #E5E5E1; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* LOGIN CENTRADO PROFESIONAL */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--white); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center; border: 1px solid var(--border); width: 340px; }
        .login-input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; text-align: center; font-size: 16px; outline: none; }
        .login-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .login-btn:active { transform: scale(0.98); }

        #admin-content { display: none; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--white); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        .kpi-value { font-size: 26px; font-weight: 700; color: var(--accent); margin-top: 5px; }

        .main-layout { display: grid; grid-template-columns: 1.6fr 1fr; gap: 30px; }
        .card { background: var(--white); border-radius: 24px; padding: 24px; border: 1px solid var(--border); margin-bottom: 30px; }
        h3 { font-family: 'Lora', serif; margin-top: 0; font-size: 18px; color: var(--accent); }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 12px; color: var(--muted); border-bottom: 2px solid var(--bg); }
        td { padding: 12px; border-bottom: 1px solid #f9f9f9; }

        .picking-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed var(--border); }
        .picking-qty { font-weight: 700; color: var(--accent); background: #F0F2EB; padding: 2px 8px; border-radius: 4px; }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-family:'Lora'; margin-bottom: 8px;">El Otro Huerto</h2>
            <p style="color:var(--muted); font-size: 14px; margin-bottom: 24px;">Panel de Administración</p>
            <input type="password" id="pass-field" class="login-input" placeholder="Clave Maestra">
            <button class="login-btn" onclick="checkAccess()">Ingresar</button>
            <p id="error-msg" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="admin-content">
        <header>
            <div><h1>Huerta de Control</h1><p style="color:var(--muted); font-size: 14px;">Gestión de Cosecha & Rentabilidad</p></div>
            <button onclick="fetchData()" style="background:white; border: 1px solid var(--border); padding: 10px 20px; border-radius: 12px; cursor:pointer; font-weight:600;">🔄 Sincronizar</button>
        </header>

        <div class="kpi-grid" id="kpi-container">
            <div class="kpi-card"><div>Venta Acumulada</div><div class="kpi-value" id="total-venta">$0</div></div>
            <div class="kpi-card"><div>Venta Mes (MTD)</div><div class="kpi-value" id="mtd-venta">$0</div></div>
            <div class="kpi-card"><div>Utilidad Est.</div><div class="kpi-value" id="utilidad-est">$0</div></div>
            <div class="kpi-card"><div>Cant. Pedidos</div><div class="kpi-value" id="pedidos-qty">0</div></div>
        </div>

        <div class="main-layout">
            <div class="left-col">
                <div class="card">
                    <h3>📦 Registro de Órdenes</h3>
                    <div style="overflow-x: auto;"><table id="orders-table"><thead><tr><th>Fecha</th><th>Cliente</th><th>Total</th><th>Pago</th></tr></thead><tbody></tbody></table></div>
                </div>
            </div>
            <div class="right-col">
                <div class="card"><h3>🧺 Picking List (Cosecha)</h3><div id="picking-list"></div></div>
                <div class="card"><h3>📊 Mix de Ventas</h3><canvas id="productsChart"></canvas></div>
            </div>
        </div>
    </div>

<script>
    const _0xkey = "RU9IMjAyNg=="; // EOH2026
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzr4xUDOZtACKNZgdHoUbvd3VMwuY7Reuj8KL2bRMEgtSoEwBrzuhqElqC-sWObuhVg/exec';

    function checkAccess() {
        if (btoa(document.getElementById('pass-field').value) === _0xkey) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            fetchData();
        } else {
            document.getElementById('error-msg').innerText = "⚠️ Clave incorrecta.";
        }
    }

    async function fetchData() {
        try {
            const response = await fetch(`${SCRIPT_URL}?action=getAdminData`);
            const data = await response.json();
            
            // Verificamos si data es el objeto {pedidos: [], productos: []}
            const pedidos = data.pedidos || [];
            const productos = data.productos || [];

            // Diccionario de costos (Punto 2 de tu lista: 9 productos)
            const costosMap = {};
            productos.forEach(prod => {
                const nombre = prod.nombre || prod.Nombre || "";
                const costo = prod.costo || prod.Costo || 0;
                costosMap[nombre.trim()] = Number(costo);
            });

            renderDashboard(pedidos, costosMap);
        } catch (e) {
            console.error("Error cargando datos:", e);
        }
    }

    function renderDashboard(pedidos, costosMap) {
        let totalAcumulado = 0;
        let mtdTotal = 0;
        let utilidadTotal = 0;
        const now = new Date();
        const tbody = document.querySelector('#orders-table tbody');
        tbody.innerHTML = '';
        const picking = {};

        pedidos.slice().reverse().forEach(p => {
            const v = Number(p.total || p.Total || 0);
            const comision = Number(p.comision_mp || p.comision_mp_ || 0);
            
            // Lógica de fechas (Punto 1 de tu lista: 13 pedidos)
            const dParts = (p.fecha || "").split(' ')[0].split('/');
            const vDate = dParts.length === 3 ? new Date(dParts[2], dParts[1]-1, dParts[0]) : new Date();

            totalAcumulado += v;
            if (vDate.getMonth() === now.getMonth()) mtdTotal += v;

            let costoPedido = 0;
            const matches = (p.detalle || "").match(/(\d+)x ([^|]+)/g);
            if (matches) {
                matches.forEach(m => {
                    const parts = m.split('x ');
                    const qty = parseInt(parts[0]);
                    const item = parts[1].trim();
                    picking[item] = (picking[item] || 0) + qty;
                    if(costosMap[item]) costoPedido += (costosMap[item] * qty);
                });
            }

            utilidadTotal += (v - comision - costoPedido);

            tbody.innerHTML += `<tr><td>${p.fecha || ''}</td><td><strong>${p.nombre || ''}</strong></td><td>$${v.toLocaleString('es-CL')}</td><td>${p.estado_pago || ''}</td></tr>`;
        });

        document.getElementById('total-venta').innerText = `$${totalAcumulado.toLocaleString('es-CL')}`;
        document.getElementById('mtd-venta').innerText = `$${mtdTotal.toLocaleString('es-CL')}`;
        document.getElementById('utilidad-est').innerText = `$${Math.floor(utilidadTotal).toLocaleString('es-CL')}`;
        document.getElementById('pedidos-qty').innerText = pedidos.length;

        renderPicking(picking);
        renderChart(picking);
    }

    function renderPicking(counts) {
        const container = document.getElementById('picking-list');
        container.innerHTML = '';
        Object.entries(counts).sort((a,b) => b[1]-a[1]).forEach(([n, q]) => {
            container.innerHTML += `<div class="picking-item"><span>${n}</span><span class="picking-qty">${q} un.</span></div>`;
        });
    }

    function renderChart(counts) {
        const ctx = document.getElementById('productsChart').getContext('2d');
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(counts).slice(0, 5).map(l => l.split('|')[0].substring(0,12)),
                datasets: [{ data: Object.values(counts).slice(0, 5), backgroundColor: '#4A5D23', borderRadius: 6 }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { display: false } } } }
        });
    }
</script>
</body>
</html>
