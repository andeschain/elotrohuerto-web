<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huerta de Control | El Otro Huerto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #FDFCFB; --bg-alt: #F4F6F0; --accent: #4A5D23; --text: #1D1D1F; --border: #EAEAEA; --success: #27AE60; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #fff; padding: 48px; border-radius: 24px; border: 1px solid var(--border); text-align: center; width: 340px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .login-input { width: 100%; padding: 16px; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 20px; text-align: center; font-size: 18px; outline: none; background: #FAFAFA; }
        .login-btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; }

        #admin-content { display: none; padding: 40px 24px; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
        h1 { font-family: 'Lora', serif; font-size: 32px; margin: 0; }

        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .kpi-card { background: #fff; padding: 24px; border-radius: 20px; border: 1px solid var(--border); }
        .kpi-label { font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .kpi-value { font-size: 32px; font-weight: 700; color: var(--accent); margin: 8px 0; }

        .main-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 32px; }
        .card { background: #fff; border-radius: 24px; padding: 28px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid var(--bg-alt); color: #666; }
        td { padding: 12px; border-bottom: 1px solid #f9f9f9; }

        .picking-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed var(--border); }
        .picking-qty { font-weight: 700; color: var(--accent); background: var(--bg-alt); padding: 2px 10px; border-radius: 6px; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-family:'Lora'; margin-top:0;">Huerta Admin</h2>
            <input type="password" id="pass-field" class="login-input" placeholder="••••••••" autofocus>
            <button class="login-btn" onclick="checkAccess()">Sincronizar</button>
            <div id="error-msg" style="color:red; font-size:12px; margin-top:16px;"></div>
        </div>
    </div>

    <div id="admin-content">
        <header>
            <div><h1>Panel de Control</h1><p id="data-status" style="color:#666;">Consultando registros...</p></div>
            <button onclick="fetchRealData()" style="background:white; border: 1px solid var(--border); padding: 10px 20px; border-radius:12px; cursor:pointer;">🔄 Actualizar</button>
        </header>

        <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-label">Ventas Brutas</div><div class="kpi-value" id="kpi-bruto">$0</div></div>
            <div class="kpi-card"><div class="kpi-label">Utilidad Neto MP</div><div class="kpi-value" id="kpi-neto">$0</div></div>
            <div class="kpi-card"><div class="kpi-label">N° Pedidos</div><div class="kpi-value" id="kpi-qty">0</div></div>
        </div>

        <div class="main-grid">
            <div class="card">
                <h3>📦 Registro de Órdenes</h3>
                <div style="overflow-x: auto;"><table id="ordersTable"><thead><tr><th>Fecha</th><th>Cliente</th><th>Total</th><th>Estado</th></tr></thead><tbody></tbody></table></div>
            </div>
            <div class="card">
                <h3>🧺 Picking List (Cosecha Jueves)</h3>
                <div id="picking-list"></div>
            </div>
        </div>
    </div>

<script>
    // 1. PEGA AQUÍ LA URL NUEVA QUE GENERASTE EN EL PASO 1
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzr4xUDOZtACKNZgdHoUbvd3VMwuY7Reuj8KL2bRMEgtSoEwBrzuhqElqC-sWObuhVg/exec';
    const _0xkey = "RU9IMjAyNg=="; 

    function checkAccess() {
        if (btoa(document.getElementById('pass-field').value) === _0xkey) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            fetchRealData();
        } else {
            document.getElementById('error-msg').innerText = "⚠️ Clave incorrecta.";
        }
    }

    async function fetchRealData() {
        const status = document.getElementById('data-status');
        try {
            // Agregamos t= para romper cualquier caché
            const res = await fetch(`${SCRIPT_URL}?action=getAdminData&t=${Date.now()}`);
            const data = await res.json();
            
            if (data.pedidos && Array.isArray(data.pedidos)) {
                status.innerText = `✅ ${data.pedidos.length} pedidos reales sincronizados.`;
                render(data.pedidos);
            } else {
                status.innerHTML = "<b style='color:red'>⚠️ Google sigue enviando PRODUCTOS.</b><br>Revisa que la URL sea la de la NUEVA IMPLEMENTACIÓN.";
            }
        } catch (e) {
            status.innerText = "❌ Error de conexión.";
        }
    }

    function render(pedidos) {
        let bruto = 0, neto = 0;
        const tbody = document.querySelector('#ordersTable tbody');
        tbody.innerHTML = '';
        const counts = {};

        pedidos.slice().reverse().forEach(p => {
            // Mapeo exacto basado en tu auditoría de ayer
            const total = Number(p.total || 0);
            const comision = Number(p.comision_mp || 0);
            
            bruto += total;
            neto += (total - comision);

            tbody.innerHTML += `<tr><td>${(p.fecha || "").split(' ')[0]}</td><td><strong>${p.nombre || '---'}</strong></td><td>$${total.toLocaleString('es-CL')}</td><td>${p.estado_pago || ''}</td></tr>`;

            const matches = (p.detalle || "").match(/(\d+)x ([^|]+)/g);
            if (matches) {
                matches.forEach(m => {
                    const p = m.split('x ');
                    const name = p[1].trim();
                    counts[name] = (counts[name] || 0) + parseInt(p[0]);
                });
            }
        });

        document.getElementById('kpi-bruto').innerText = `$${bruto.toLocaleString('es-CL')}`;
        document.getElementById('kpi-neto').innerText = `$${Math.floor(neto).toLocaleString('es-CL')}`;
        document.getElementById('kpi-qty').innerText = pedidos.length;

        const pickDiv = document.getElementById('picking-list');
        pickDiv.innerHTML = '';
        Object.entries(counts).sort((a,b) => b[1]-a[1]).forEach(([n, q]) => {
            pickDiv.innerHTML += `<div class="picking-item"><span>${n}</span><span class="picking-qty">${q} un.</span></div>`;
        });
    }
</script>
</body>
</html>
