<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <title>Admin V4.3.2 | El Otro Huerto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #F8F9F5; --white: #FFFFFF; --accent: #4A5D23; --text: #1C1C1E; --muted: #6E6E73; --border: #E5E5E1; --success: #28CD41; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--white); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center; border: 1px solid var(--border); width: 320px; }
        .login-input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; text-align: center; font-size: 16px; outline: none; box-sizing: border-box; }
        .login-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        #admin-content { display: none; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--white); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        .kpi-value { font-size: 28px; font-weight: 700; color: var(--accent); margin: 5px 0; }
        .main-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .card { background: var(--white); border-radius: 24px; padding: 24px; border: 1px solid var(--border); margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 10px; color: var(--muted); border-bottom: 1px solid var(--bg); text-transform: uppercase; font-size: 10px; }
        td { padding: 12px 10px; border-bottom: 1px solid #f9f9f9; }
        .picking-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--border); font-size: 13px; }
        .picking-qty { font-weight: 700; color: var(--accent); }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-family:'Lora'">El Otro Huerto</h2>
            <input type="password" id="pass-field" class="login-input" placeholder="EOH2026">
            <button class="login-btn" onclick="checkAccess()">Entrar</button>
        </div>
    </div>

    <div id="admin-content">
        <header>
            <div><h1>Huerta de Control</h1><p style="color:var(--muted); font-size: 14px;">Auditoría de Rentabilidad & Cosecha</p></div>
            <button onclick="fetchData()" style="background:var(--white); border: 1px solid var(--border); padding: 10px 20px; border-radius: 12px; cursor:pointer; font-weight:600;">🔄 Sincronizar</button>
        </header>

        <div class="kpi-grid">
            <div class="kpi-card"><div>Ventas Brutas</div><div class="kpi-value" id="kpi-total">$0</div></div>
            <div class="kpi-card"><div>Utilidad Neta Est.</div><div class="kpi-value" id="kpi-neto">$0</div></div>
            <div class="kpi-card"><div>Margen Promedio</div><div class="kpi-value" id="kpi-margin">0%</div></div>
            <div class="kpi-card"><div>Órdenes</div><div class="kpi-value" id="kpi-qty">0</div></div>
        </div>

        <div class="main-layout">
            <div class="left-col">
                <div class="card">
                    <h3>📦 Registro de Ventas Real</h3>
                    <div style="overflow-x: auto;"><table id="orders-table"><thead><tr><th>Fecha</th><th>Cliente</th><th>Venta</th><th>Comisión MP</th><th>Estado</th></tr></thead><tbody></tbody></table></div>
                </div>
                <div class="card"><h3>📈 Mix de Productos</h3><canvas id="productsChart" height="100"></canvas></div>
            </div>
            <div class="right-col">
                <div class="card"><h3>🧺 Picking List (Cosecha)</h3><div id="picking-list"></div></div>
            </div>
        </div>
    </div>

<script>
    const _0xkey = "RU9IMjAyNg=="; 
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzr4xUDOZtACKNZgdHoUbvd3VMwuY7Reuj8KL2bRMEgtSoEwBrzuhqElqC-sWObuhVg/exec';

    function checkAccess() {
        if (btoa(document.getElementById('pass-field').value) === _0xkey) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            fetchData();
        }
    }

    async function fetchData() {
        try {
            const response = await fetch(`${SCRIPT_URL}?action=getAdminData`);
            const data = await response.json();
            if (data && data.pedidos) {
                // Creamos un mapa de costos para cruzar rentabilidad
                const costosMap = {};
                if(data.productos) {
                    data.productos.forEach(p => costosMap[p.nombre] = Number(p.costo || 0));
                }
                renderDashboard(data.pedidos, costosMap);
            }
        } catch (e) { console.error("Error:", e); }
    }

    function renderDashboard(pedidos, costosMap) {
        let totalVenta = 0, totalComision = 0, totalCostoProd = 0;
        const tbody = document.querySelector('#orders-table tbody');
        tbody.innerHTML = '';
        const picking = {};

        pedidos.slice().reverse().forEach(p => {
            const v = Number(p.total || 0);
            // El script limpia "Comision_MP." a "comision_mp"
            const c = Number(p.comision_mp || 0);
            
            totalVenta += v;
            totalComision += c;

            tbody.innerHTML += `<tr><td>${p.fecha || ''}</td><td><strong>${p.nombre || ''}</strong></td><td>$${v.toLocaleString('es-CL')}</td><td>$${Math.floor(c).toLocaleString('es-CL')}</td><td>${p.estado_pago || ''}</td></tr>`;

            const matches = (p.detalle || "").match(/(\d+)x ([^|]+)/g);
            if (matches) {
                matches.forEach(m => {
                    const parts = m.split('x ');
                    const qty = parseInt(parts[0]);
                    const itemName = parts[1].trim();
                    picking[itemName] = (picking[itemName] || 0) + qty;
                    
                    // Sumamos costo de producto si existe en el mapa
                    if(costosMap[itemName]) totalCostoProd += (costosMap[itemName] * qty);
                });
            }
        });

        const utilidadNeta = totalVenta - totalComision - totalCostoProd;
        const margenPorc = totalVenta > 0 ? (utilidadNeta / totalVenta) * 100 : 0;

        document.getElementById('kpi-total').innerText = `$${totalVenta.toLocaleString('es-CL')}`;
        document.getElementById('kpi-neto').innerText = `$${Math.floor(utilidadNeta).toLocaleString('es-CL')}`;
        document.getElementById('kpi-margin').innerText = `${margenPorc.toFixed(1)}%`;
        document.getElementById('kpi-qty').innerText = pedidos.length;

        renderPickingList(picking);
        renderChart(picking);
    }

    function renderPickingList(picking) {
        const container = document.getElementById('picking-list');
        container.innerHTML = '';
        Object.entries(picking).sort((a,b) => b[1] - a[1]).forEach(([name, qty]) => {
            container.innerHTML += `<div class="picking-item"><span>${name}</span><span class="picking-qty">${qty}</span></div>`;
        });
    }

    function renderChart(picking) {
        const ctx = document.getElementById('productsChart').getContext('2d');
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(picking).slice(0, 8),
                datasets: [{ data: Object.values(picking).slice(0, 8), backgroundColor: '#4A5D23', borderRadius: 8 }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { display: false } } } }
        });
    }
</script>
</body>
</html>
