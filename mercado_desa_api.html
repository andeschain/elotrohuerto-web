<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🛠️ DEV - Mercado Rural | El Otro Huerto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #FDFCFB; 
            --bg-alt: #F4F6F0; 
            --text-main: #1D1D1F; 
            --text-muted: #515154; 
            --accent: #4A5D23; 
            --border: #EAEAEA;
            --danger: #D93025;
        }

        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg-page); color: var(--text-main); 
            margin: 0; padding: 0; -webkit-font-smoothing: antialiased; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh;
        }

        *, *:before, *:after { box-sizing: border-box; }
        h1, h2, h3 { font-family: 'Lora', serif; margin-top: 0; color: var(--text-main); }
        main { flex-grow: 1; }
        
        header {
            position: sticky; top: 0; background: #fff; border-bottom: 1px solid var(--border); z-index: 100; padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo-container { display: flex; align-items: center; gap: 12px; font-family: 'Lora', serif; font-weight: 600; font-size: 20px; text-decoration: none; color: var(--text-main); }
        
        .cart-btn {
            background: none; border: none; cursor: pointer; position: relative;
            display: flex; align-items: center; gap: 8px; font-family: 'Inter', sans-serif; font-weight: 600; color: var(--accent); padding: 8px;
        }
        .cart-badge {
            background: var(--accent); color: white; font-size: 12px; padding: 2px 6px; 
            border-radius: 12px; position: absolute; top: -2px; right: -8px; display: none;
            border: 2px solid #fff; font-weight: 700;
        }

        /* OVERLAY SIN BLUR PARA EVITAR DESENFOQUE */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.4); z-index: 999; 
            opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .overlay.open { opacity: 1; visibility: visible; }

        .drawer {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 440px; height: 100vh; 
            background: #fff; z-index: 1000; box-shadow: -10px 0 40px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .drawer.open { right: 0; }

        .drawer-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .drawer-body { padding: 24px; overflow-y: auto; flex-grow: 1; background: #fff; }

        /* ITEMS DEL CARRITO - CORREGIDO COLOR Y VISIBILIDAD */
        .cart-item { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
        }
        .item-info h4 { margin: 0 0 4px 0; font-size: 15px; font-family: 'Inter', sans-serif; color: var(--text-main); }
        .item-info p { margin: 0; font-size: 13px; color: var(--text-muted); }
        
        .item-controls { display: flex; align-items: center; gap: 12px; background: var(--bg-alt); border-radius: 20px; padding: 6px 12px;}
        .btn-qty { background: none; border: none; width: 24px; height: 24px; cursor: pointer; font-weight: 700; font-size: 18px; color: var(--accent);}
        .qty-val { color: var(--text-main); font-weight: 600; font-size: 14px; }

        .hero { padding: 40px 24px; text-align: center; }
        .search-container { max-width: 1080px; margin: 0 auto 32px auto; padding: 0 24px; }
        .search-input { width: 100%; padding: 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 16px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 32px; padding: 0 24px 80px; max-width: 1080px; margin: 0 auto; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .card-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-bottom: 1px solid var(--border); }
        .card-body { padding: 24px; display: flex; flex-direction: column; flex-grow: 1; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 20px; margin-top: auto;}
        
        .btn-add { background: var(--text-main); color: #fff; border: none; padding: 12px 20px; border-radius: 24px; font-weight: 600; cursor: pointer; transition: 0.2s;}
        .btn-add:active { transform: scale(0.95); }

        .drawer-footer { padding: 24px; border-top: 1px solid var(--border); background: #fff; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; color: var(--text-main); }
        .total-row.final { font-size: 20px; font-weight: 700; border-top: 1px dashed var(--border); padding-top: 16px; margin-top: 12px; }
        
        .btn-checkout { width: 100%; background: var(--accent); color: #fff; border: none; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-secondary { width: 100%; background: #f0f0f0; color: var(--text-main); border: none; padding: 14px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; }

        input[type="text"], input[type="email"], input[type="tel"] { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; font-size: 16px; }

        .radio-card { border: 1px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; margin-bottom: 10px; display: block; position: relative; background: #fff;}
        .radio-card.selected { border: 2px solid var(--accent); background: var(--bg-alt); }
        .radio-card input { position: absolute; opacity: 0; }

        .dev-badge { position: fixed; bottom: 0; left: 0; background: #D93025; color: white; z-index: 10001; font-size: 11px; padding: 4px 12px; font-weight: bold; border-top-right-radius: 8px; }

        @media(max-width: 767px) { .grid { grid-template-columns: 1fr; } .drawer { max-width: 100%; } }
    </style>

    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB1CcdwY-opGXS-a9m30PxcPPYcOa4L6wE&libraries=places,geometry&callback=initMap"></script>
</head>
<body>

    <div class="dev-badge">MODO DESARROLLO</div>

    <header>
        <a href="index.html" class="logo-container">
            El Otro Huerto <span style="font-weight:400; color:var(--text-muted);">| Mercado Rural</span>
        </a>
        <button class="cart-btn" onclick="toggleDrawer()">
            🛒 <span class="cart-badge" id="cartCount">0</span>
        </button>
    </header>

    <main>
        <section class="hero">
            <h1>Cosecha real de Paine</h1>
            <p>Directo a tu mesa en Barrio Las Lilas.</p>
        </section>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Buscar productos..." onkeyup="filtrarProductos()">
        </div>

        <section class="grid" id="productGrid">
            <p style="text-align:center; grid-column: 1/-1;">Cargando cosecha...</p>
        </section>
    </main>

    <div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
    
    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <h2 id="drawerTitle">Tu Cosecha</h2>
            <button class="close-drawer" onclick="toggleDrawer()">×</button>
        </div>
        
        <div class="drawer-body" id="step-cart">
            <div id="cartItemsContainer"></div>
        </div>

        <div class="drawer-body" id="step-checkout" style="display: none;">
            <h3 style="font-size:16px; margin-bottom:12px;">1. Método de entrega</h3>
            <label class="radio-card selected" onclick="selectDelivery('plaza', this)">
                <input type="radio" name="delivery" value="plaza" checked>
                <strong>📍 Plaza Las Lilas</strong> (Sáb) - Gratis
            </label>
            <label class="radio-card" onclick="selectDelivery('domicilio', this)">
                <input type="radio" name="delivery" value="domicilio">
                <strong>🛵 Domicilio</strong> (Jue) - $2.500
            </label>

            <div id="addressBox" style="display: none; margin-top: 16px;">
                <input type="text" id="custAddress" placeholder="Dirección (Calle y Número)" autocomplete="off">
                <p id="addressError" style="color: var(--danger); font-size: 12px; display:none; margin-top:-8px; margin-bottom:12px;"></p>
            </div>

            <h3 style="font-size:16px; margin-top:20px; margin-bottom:12px;">2. Datos de contacto</h3>
            <input type="text" id="custName" placeholder="Nombre completo">
            <input type="email" id="custEmail" placeholder="Email">
            <input type="tel" id="custPhone" placeholder="WhatsApp +569...">
        </div>

        <div class="drawer-footer">
            <div id="footer-cart">
                <div class="total-row final">
                    <span>Total:</span> <span id="cartTotal">$0</span>
                </div>
                <button class="btn-checkout" id="btnGoCheckout" onclick="changeStep(2)">Continuar</button>
            </div>
            <div id="footer-checkout" style="display: none;">
                <button class="btn-secondary" onclick="changeStep(1)">← Editar pedido</button>
                <button class="btn-checkout" id="btnFinalPagar" onclick="procesarPedido()">Ir a pagar</button>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzr4xUDOZtACKNZgdHoUbvd3VMwuY7Reuj8KL2bRMEgtSoEwBrzuhqElqC-sWObuhVg/exec';
        let cart = {};
        let deliveryCost = 0;
        let isAddressValid = true;

        function initMap() {
            const input = document.getElementById('custAddress');
            const autocomplete = new google.maps.places.Autocomplete(input, { 
                componentRestrictions: { country: 'cl' },
                fields: ['geometry', 'formatted_address'] 
            });
            const plazaLilas = new google.maps.LatLng(-33.433299, -70.598064); 

            autocomplete.addListener('place_changed', () => {
                const place = autocomplete.getPlace();
                const errorMsg = document.getElementById('addressError');
                if (!place.geometry) {
                    errorMsg.innerText = "Selecciona una dirección de la lista.";
                    errorMsg.style.display = 'block';
                    isAddressValid = false;
                    return;
                }
                const dist = google.maps.geometry.spherical.computeDistanceBetween(place.geometry.location, plazaLilas);
                if (dist > 1500) {
                    errorMsg.innerText = "Fuera del radio de 1.5km (Plaza Las Lilas).";
                    errorMsg.style.display = 'block';
                    isAddressValid = false;
                } else {
                    errorMsg.style.display = 'none';
                    isAddressValid = true;
                }
            });
        }

        async function cargarProductos() {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                const productos = await res.json();
                const grid = document.getElementById('productGrid');
                grid.innerHTML = '';
                productos.forEach(p => {
                    if (p.estado !== 'Activo') return;
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${p.imagen_url}" class="card-img">
                            <div class="card-body">
                                <span style="font-size:10px; color:var(--accent); font-weight:700; text-transform:uppercase;">${p.segmento}</span>
                                <h2 style="font-size:20px; margin: 8px 0;">${p.nombre}</h2>
                                <p style="font-size:14px; color:var(--text-muted); flex-grow:1;">${p.descripcion}</p>
                                <div class="card-footer">
                                    <strong style="font-size:18px;">$${Number(p.precio).toLocaleString('es-CL')}</strong>
                                    <button class="btn-add" onclick="addToCart('${p.id}', '${p.nombre}', ${p.precio}, this)">Agregar</button>
                                </div>
                            </div>
                        </div>`;
                });
            } catch(e) { console.error(e); }
        }

        function addToCart(id, name, price, btn) {
            if(cart[id]) cart[id].qty++; else cart[id] = { name, price, qty: 1 };
            const originalText = btn.innerText;
            btn.innerText = "¡Listo! 🌿";
            btn.style.background = "#4A5D23";
            setTimeout(() => { btn.innerText = originalText; btn.style.background = ""; }, 1000);
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cartItemsContainer');
            container.innerHTML = '';
            let subtotal = 0; let count = 0;
            Object.keys(cart).forEach(id => {
                const item = cart[id];
                subtotal += item.price * item.qty;
                count += item.qty;
                container.innerHTML += `
                    <div class="cart-item">
                        <div class="item-info"><h4>${item.name}</h4><p>$${item.price.toLocaleString('es-CL')}</p></div>
                        <div class="item-controls">
                            <button class="btn-qty" onclick="updateQty('${id}', -1)">-</button>
                            <span class="qty-val">${item.qty}</span>
                            <button class="btn-qty" onclick="updateQty('${id}', 1)">+</button>
                        </div>
                    </div>`;
            });
            const total = subtotal + deliveryCost;
            document.getElementById('cartTotal').innerText = '$' + total.toLocaleString('es-CL');
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartCount').style.display = count > 0 ? 'block' : 'none';
            if(count === 0) { 
                container.innerHTML = '<p style="text-align:center; color:#888; padding:20px;">Tu canasta está vacía.</p>';
                document.getElementById('btnGoCheckout').disabled = true;
            } else {
                document.getElementById('btnGoCheckout').disabled = false;
            }
        }

        function updateQty(id, change) {
            cart[id].qty += change;
            if(cart[id].qty <= 0) delete cart[id];
            updateCartUI();
        }

        function toggleDrawer() {
            document.getElementById('drawer').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
            if(!document.getElementById('drawer').classList.contains('open')) changeStep(1);
        }

        function changeStep(s) {
            document.getElementById('step-cart').style.display = s === 1 ? 'block' : 'none';
            document.getElementById('footer-cart').style.display = s === 1 ? 'block' : 'none';
            document.getElementById('step-checkout').style.display = s === 2 ? 'block' : 'none';
            document.getElementById('footer-checkout').style.display = s === 2 ? 'block' : 'none';
            document.getElementById('drawerTitle').innerText = s === 1 ? "Tu Cosecha" : "Datos de Entrega";
        }

        function selectDelivery(type, el) {
            document.querySelectorAll('.radio-card').forEach(r => r.classList.remove('selected'));
            el.classList.add('selected');
            deliveryCost = type === 'domicilio' ? 2500 : 0;
            document.getElementById('addressBox').style.display = type === 'domicilio' ? 'block' : 'none';
            updateCartUI();
        }

        function filtrarProductos() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }

        async function procesarPedido() {
            const btn = document.getElementById('btnFinalPagar');
            const name = document.getElementById('custName').value;
            const email = document.getElementById('custEmail').value;
            const phone = document.getElementById('custPhone').value;

            if(!name || !email || !phone || (deliveryCost > 0 && !isAddressValid)) {
                alert("Por favor, completa todos los datos correctamente."); return;
            }

            btn.innerText = "Procesando..."; btn.disabled = true;
            // Aquí iría tu lógica de fetch para Mercado Pago...
            alert("Redirigiendo a pago seguro...");
        }

        cargarProductos();
    </script>
</body>
</html>
