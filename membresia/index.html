<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Privado | El Otro Huerto</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #FDFCFB; 
            --text-main: #1D1D1F; 
            --text-muted: #515154; 
            --accent: #4A5D23; 
            --border: #EAEAEA;
        }

        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg-page); color: var(--text-main); 
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; -webkit-font-smoothing: antialiased;
        }

        .login-box {
            background: #fff; padding: 40px; border-radius: 16px; border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); max-width: 400px; width: 90%; text-align: center;
        }
        
        /* Asegúrate de que la ruta a tu logo sea correcta. Le agregué ../ suponiendo que está en la carpeta raíz */
        .login-box img { height: 40px; margin-bottom: 24px; }
        
        input[type="password"] {
            width: 100%; padding: 16px; font-size: 16px; border: 1px solid var(--border); border-radius: 8px; 
            margin-bottom: 16px; box-sizing: border-box; text-align: center; letter-spacing: 2px;
        }
        input[type="password"]:focus { outline: none; border-color: var(--accent); }
        
        .btn-primary { 
            display: inline-block; background-color: var(--accent); color: #FFFFFF; padding: 16px 24px; 
            border-radius: 8px; font-weight: 600; text-align: center; border: none; cursor: pointer; 
            transition: all 0.2s ease; width: 100%; font-size: 16px;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(74,93,35,0.2); }
        
        #errorMsg { color: #D93025; font-size: 14px; display: none; margin-top: 12px; }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="../assets/logo.svg" alt="El Otro Huerto" onerror="this.style.display='none'">
        <h2 style="font-size: 20px; margin-bottom: 8px; margin-top: 0;">Invitación Privada</h2>
        <p style="font-size: 15px; color: var(--text-muted); margin-bottom: 24px;">Ingresa la clave de acceso para ver la propuesta de membresía.</p>
        
        <input type="password" id="passInput" placeholder="Contraseña">
        <button class="btn-primary" onclick="checkAccess()" id="loginBtn">Ver Propuesta</button>
        <p id="errorMsg">Clave incorrecta.</p>
    </div>

    <script>
        // La clave es "tribu2026"
        const ACCESS_HASH = "79776e677a3735373b"; 

        function hashString(str) { 
            return Array.from(str).map(char => (char.charCodeAt(0) + 5).toString(16)).join(''); 
        }

        function checkAccess() {
            const input = document.getElementById("passInput").value.trim().toLowerCase();
            const btn = document.getElementById("loginBtn");
            
            if(hashString(input) === ACCESS_HASH) {
                // Efecto visual de que está cargando
                btn.innerHTML = "Abriendo...";
                btn.style.opacity = "0.7";
                
                // REDIRECCIÓN A TU NOTION:
                // Reemplaza esta URL por el link público largo de tu Notion
                window.location.href = "https://quillagua.notion.site/Membresia-El-Otro-Huerto-2f17a196a68580b8a5f3f0f51d5450c6?source=copy_link"; 
                
            } else {
                const errorMsg = document.getElementById("errorMsg");
                errorMsg.style.display = "block";
                
                const box = document.querySelector(".login-box");
                box.style.transform = "translateX(-10px)";
                setTimeout(() => box.style.transform = "translateX(10px)", 100);
                setTimeout(() => box.style.transform = "translateX(-10px)", 200);
                setTimeout(() => box.style.transform = "translateX(0)", 300);
            }
        }

        document.getElementById("passInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { 
                event.preventDefault(); 
                checkAccess(); 
            }
        });
    </script>
</body>
</html>
