<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitación Privada | El Otro Huerto</title>
    
    <meta property="og:title" content="Tu refugio de fin de semana, sin ~el cacho de~ mantenerlo 🌿">
    <meta property="og:description" content="Estamos armando un grupo limitado de familias para compartir nuestro refugio en Paine. Ingresa con tu clave de invitación para ver los detalles.">
    <meta property="og:image" content="https://elotrohuerto.cl/assets/familias.jpg">
    <meta property="og:url" content="https://elotrohuerto.cl/membresia">
    <meta property="og:type" content="website">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #F4F6F0; 
            --text-main: #1D1D1F; 
            --text-muted: #515154; 
            --accent: #4A5D23; 
            --border: #EAEAEA;
        }

        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg-page); color: var(--text-main); 
            margin: 0; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
        }

        /* Diseño de tarjeta Premium con Animación de Entrada */
        .login-card {
            background: #fff; border-radius: 24px; border: 1px solid var(--border);
            box-shadow: 0 24px 48px rgba(0,0,0,0.06); max-width: 420px; width: 100%; 
            overflow: hidden; 
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Foto en la parte superior de la tarjeta */
        .card-image {
            width: 100%; height: 220px; 
            background-image: url('../assets/familias.jpg'); 
            background-size: cover; background-position: center;
            border-bottom: 4px solid var(--accent);
        }

        .card-content { padding: 32px 32px 40px 32px; }
        
        .card-content img { height: 32px; margin-bottom: 24px; }
        
        h1 { 
            font-family: 'Lora', serif; 
            font-size: 26px; 
            margin-top: 0; 
            margin-bottom: 12px; 
            line-height: 1.25; 
            color: var(--text-main); 
            letter-spacing: -0.5px;
        }
        
        p.subtitle { 
            font-size: 15px; 
            color: var(--text-muted); 
            margin-bottom: 32px; 
            line-height: 1.6; /* Aumentado para mejor lectura en celular */
        }
        
        /* Inputs y Botones optimizados para "Touch" (Dedos) */
        input[type="password"] {
            width: 100%; padding: 16px; font-size: 16px; border: 1px solid var(--border); 
            border-radius: 12px; /* Más redondo para look móvil moderno */
            margin-bottom: 16px; box-sizing: border-box; text-align: center; letter-spacing: 2px;
            background-color: #FAFAFA;
            -webkit-appearance: none; /* Evita estilos feos por defecto en iOS */
            transition: all 0.2s ease;
        }
        input[type="password"]:focus { 
            outline: none; 
            border-color: var(--accent); 
            background-color: #FFF;
            box-shadow: 0 0 0 3px rgba(74, 93, 35, 0.1);
        }
        
        .btn-primary { 
            display: inline-block; background-color: var(--accent); color: #FFFFFF; 
            padding: 16px 24px; border-radius: 12px; font-weight: 600; text-align: center; 
            border: none; cursor: pointer; transition: all 0.2s ease; width: 100%; 
            font-size: 16px; letter-spacing: 0.5px;
            -webkit-appearance: none;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(74,93,35,0.2); }
        .btn-primary:active { transform: translateY(0); box-shadow: none; } /* Efecto de toque real */
        
        #errorMsg { color: #D93025; font-size: 14px; display: none; margin-top: 16px; font-weight: 500; }

        /* Ajustes específicos para celulares (Pantallas chicas) */
        @media (max-width: 480px) {
            .card-content { padding: 24px 20px 32px 20px; }
            h1 { font-size: 24px; }
            .card-image { height: 180px; }
            p.subtitle { font-size: 14px; margin-bottom: 24px; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="card-image"></div>
        
        <div class="card-content">
            <img src="../assets/logo.svg" alt="El Otro Huerto" onerror="this.style.display='none'">
            
            <h1>Tu refugio de fin de semana, sin <span style="text-decoration: line-through; color: var(--text-muted); text-decoration-thickness: 2px; opacity: 0.8;">el cacho de</span> mantenerlo.</h1>
            <p class="subtitle">Estamos armando un grupo limitado de familias afines. Ingresa la clave de tu invitación para conocer los detalles del piloto.</p>
            
            <input type="password" id="passInput" placeholder="Ingresa tu clave">
            <button class="btn-primary" onclick="checkAccess()" id="loginBtn">Ver Propuesta Privada</button>
            <p id="errorMsg">Clave incorrecta. Inténtalo de nuevo.</p>
        </div>
    </div>

    <script>
        // La clave es "tribu2026"
        const ACCESS_HASH = "79776e677a3735373b"; 

        function hashString(str) { 
            return Array.from(str).map(char => (char.charCodeAt(0) + 5).toString(16)).join(''); 
        }

        function checkAccess() {
            const input = document.getElementById("passInput").value.trim().toLowerCase();
            const btn = document.getElementById("loginBtn");
            
            if(hashString(input) === ACCESS_HASH) {
                btn.innerHTML = "Abriendo invitación...";
                btn.style.opacity = "0.7";
                
                // REDIRECCIÓN A TU NOTION:
                window.location.href = "https://quillagua.notion.site/Membresia-El-Otro-Huerto-2f17a196a68580b8a5f3f0f51d5450c6?source=copy_link"; 
                
            } else {
                const errorMsg = document.getElementById("errorMsg");
                errorMsg.style.display = "block";
                
                const card = document.querySelector(".login-card");
                card.style.transform = "translateX(-10px)";
                setTimeout(() => card.style.transform = "translateX(10px)", 100);
                setTimeout(() => card.style.transform = "translateX(-10px)", 200);
                setTimeout(() => card.style.transform = "translateX(0)", 300);
            }
        }

        // Permitir que la gente en celular le dé a "Ir" o "Enter" en el teclado
        document.getElementById("passInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { 
                event.preventDefault(); 
                // Ocultar el teclado en celulares para que vean el efecto de abrir
                this.blur(); 
                checkAccess(); 
            }
        });
    </script>
</body>
</html>
