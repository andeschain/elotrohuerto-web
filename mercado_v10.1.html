<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mercado Rural | El Otro Huerto | V10.1</title>
    
    <meta name="description" content="Cosechas libres de químicos. Local y con certificado de origen">
    <meta property="og:title" content="El Otro Huerto | Mercado Rural Barrio Las Lilas 🌿">
    <meta property="og:description" content="Cosecha de Paine. ¡Haz tu pedido aquí!">
    <meta property="og:image" content="https://elotrohuerto.cl/assets/jardin.jpg">
    <meta property="og:url" content="https://elotrohuerto.cl/mercado">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #FDFCFB; 
            --bg-alt: #F4F6F0; 
            --text-main: #1D1D1F; 
            --text-muted: #515154; 
            --accent: #4A5D23; 
            --border: #EAEAEA;
            --danger: #D93025;
            --coming-soon: #E67E22;
            --stock-warning: #D35400;
        }

        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg-page); color: var(--text-main); 
            margin: 0; padding: 0; -webkit-font-smoothing: antialiased; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh;
        }

        *, *:before, *:after { box-sizing: border-box; }
        h1, h2, h3 { font-family: 'Lora', serif; margin-top: 0; color: var(--text-main); }
        main { flex-grow: 1; }
        
        header {
            position: sticky; top: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 100; padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo-container { display: flex; align-items: center; gap: 12px; font-family: 'Lora', serif; font-weight: 600; font-size: 20px; text-decoration: none; color: var(--text-main); }
        
        .cart-btn { background: none; border: none; cursor: pointer; position: relative; display: flex; align-items: center; gap: 8px; font-family: 'Inter', sans-serif; font-weight: 600; color: var(--accent); padding: 8px; }
        .cart-badge { background: var(--accent); color: white; font-size: 11px; padding: 2px 6px; border-radius: 12px; position: absolute; top: -2px; right: -8px; display: none; border: 2px solid #fff; font-weight: 700; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 32px; padding: 0 24px 80px; max-width: 1080px; margin: 0 auto; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.3s ease; position: relative;}
        .card:hover { transform: translateY(-4px); box-shadow: 0 16px 32px rgba(0,0,0,0.06); }
        
        .card-img-container { width: 100%; aspect-ratio: 4/3; overflow: hidden; background-color: var(--bg-alt); position: relative; }
        .card-img { width: 100%; height: 100%; object-fit: cover; object-position: center; transition: transform 0.5s ease; -webkit-user-drag: none; }
        .card:hover .card-img { transform: scale(1.08); }

        .filter-container { max-width: 1080px; margin: 0 auto 30px; padding: 0 24px; }
        .filter-pills { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 5px 0; }
        .filter-pills::-webkit-scrollbar { display: none; }
        .pill { padding: 8px 16px; border-radius: 50px; background: #fff; border: 1px solid var(--border); font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.2s; color: var(--text-muted); }
        .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .card-body { padding: 24px; display: flex; flex-direction: column; flex-grow: 1; }
        .card-segment { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; font-family: 'Inter', sans-serif; }
        .card-title { font-size: 22px; margin: 0 0 8px 0; font-family: 'Lora', serif; font-weight: 600; line-height: 1.2; }
        .stock-label { font-size: 13px; font-weight: 600; color: var(--stock-warning); margin-bottom: 12px; display: flex; align-items: center; gap: 4px; }
        .card-desc { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; flex-grow: 1; }
        
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 20px; margin-top: auto;}
        .price { font-size: 18px; font-weight: 700; }
        .btn-add { background: var(--text-main); color: #fff; border: none; padding: 12px 22px; border-radius: 24px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px;}
        .btn-add:disabled { background: #eee; color: #888; cursor: not-allowed; }

        .status-badge { position: absolute; top: 12px; right: 12px; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; z-index: 10; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-out { background: #1d1d1f; }
        .badge-soon { background: var(--coming-soon); }

        .drawer { position: fixed; top: 0; right: -100%; width: 100%; max-width: 440px; height: 100vh; background: #fff; z-index: 1000; box-shadow: -10px 0 40px rgba(0,0,0,0.1); display: flex; flex-direction: column; transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .drawer.open { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; opacity: 0; visibility: hidden; transition: 0.3s; }
        .overlay.open { opacity: 1; visibility: visible; }

        .drawer-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fff; flex-shrink: 0; }
        .drawer-body { padding: 24px; overflow-y: auto; flex-grow: 1; background: #fff; -webkit-overflow-scrolling: touch; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
        .item-info h4 { margin: 0 0 4px 0; font-size: 16px; font-weight: 600; }
        .item-controls { display: flex; align-items: center; gap: 16px; background: var(--bg-alt); border-radius: 30px; padding: 8px 16px;}
        .btn-qty { background: none; border: none; width: 24px; height: 24px; cursor: pointer; font-weight: 700; font-size: 20px; color: var(--accent); display: flex; align-items: center; justify-content: center; }

        .form-input { width: 100%; padding: 16px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; font-size: 16px; background: #FAFAFA; font-family: 'Inter', sans-serif; -webkit-appearance: none; }
        .form-input:focus { border-color: var(--accent); outline: none; background: #fff; }
        
        .radio-card { border: 1px solid var(--border); border-radius: 12px; padding: 18px; cursor: pointer; margin-bottom: 12px; display: block; position: relative; transition: 0.2s; background: #fff;}
        .radio-card.selected { border: 2px solid var(--accent); background: var(--bg-alt); }
        .radio-card input { position: absolute; opacity: 0; }
        .radio-title { font-weight: 700; font-size: 15px; display: block; margin-bottom: 4px; }
        .radio-desc { font-size: 13px; color: var(--text-muted); line-height: 1.4; }

        .drawer-footer { padding: 20px 24px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); background: #fff; flex-shrink: 0; box-shadow: 0 -10px 20px rgba(0,0,0,0.03); }
        .btn-main { width: 100%; background: var(--accent); color: #fff; border: none; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }

        .badge-marcha { position: fixed; bottom: 0; left: 0; background: var(--accent); color: white; z-index: 10; font-size: 11px; padding: 8px 14px; font-weight: bold; border-top-right-radius: 12px; text-transform: uppercase; letter-spacing: 0.5px; width: auto; pointer-events: none; }

        @media(max-width: 767px) { 
            .grid { grid-template-columns: 1fr; padding: 0 20px 120px; } 
            .drawer { max-width: 100%; }
            .badge-marcha { width: 100%; border-top-right-radius: 0; text-align: center; }
            h1 { font-size: 32px !important; }
        }
    </style>

    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB1CcdwY-opGXS-a9m30PxcPPYcOa4L6wE&libraries=places,geometry&callback=initMap"></script>
</head>
<body>

    <div class="badge-marcha">Marcha Blanca: Las Lilas, Michelangelo & Casona</div>

    <header>
        <a href="index.html" class="logo-container">
            El Otro Huerto <span style="font-weight:400; color:var(--text-muted);">| Mercado Rural</span>
        </a>
        <button class="cart-btn" onclick="toggleDrawer()" id="headerCartBtn">
            🛒 <span class="cart-badge" id="cartCount">0</span>
        </button>
    </header>

    <main>
        <section style="padding: 40px 24px 20px; text-align: center;">
            <h1 style="font-size: 40px; margin-bottom: 8px;">Cosecha real de Paine</h1>
            <p>Directo del huerto a tu mesa.</p>
        </section>

        <div class="filter-container">
            <input type="text" id="searchInput" placeholder="🔍 Buscar productos..." onkeyup="filtrar()" class="form-input" style="margin-bottom: 10px;">
            <div class="filter-pills" id="categoryFilters">
                <button class="pill active" onclick="filtrarCategoria('Todos', this)">Todos</button>
            </div>
        </div>

        <section class="grid" id="productGrid">
            <p style="text-align:center; grid-column: 1/-1; padding: 40px; color: var(--text-muted);">Cargando la cosecha del día...</p>
        </section>
    </main>

    <div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
    
    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <h2 id="drawerTitle" style="font-size:18px; margin:0;">Tu Canasta</h2>
            <button onclick="toggleDrawer()" style="background:none; border:none; font-size:32px; cursor:pointer; padding: 4px;">&times;</button>
        </div>
        
        <div class="drawer-body">
            <div id="step-cart">
                <div id="cartItemsContainer"></div>
            </div>

            <div id="step-checkout" style="display: none;">
                <h3 style="font-size:13px; color:var(--accent); text-transform:uppercase; margin-bottom:16px; letter-spacing:1px;">1. Método de entrega (Jueves)</h3>
                
                <div class="radio-group">
                    <label class="radio-card selected" onclick="selectDelivery('kinder', this)">
                        <input type="radio" name="delivery" value="kinder" checked>
                        <span class="radio-title">📍 Casa Kinder Michelangelo</span>
                        <span class="radio-desc">Entrega gratuita en Las Pimpinelas el día jueves..</span>
                    </label>

                    <label class="radio-card" onclick="selectDelivery('casona', this)">
                        <input type="radio" name="delivery" value="casona">
                        <span class="radio-title">🏛️ Casona Michelangelo</span>
                        <span class="radio-desc">Entrega gratuita en Eliodoro el día jueves.</span>
                    </label>

                    <label class="radio-card" onclick="selectDelivery('domicilio', this)">
                        <input type="radio" name="delivery" value="domicilio">
                        <span class="radio-title">🛵 Despacho a Domicilio ($3.500)</span>
                        <span class="radio-desc">Radio 1.5km Plaza Las Lilas. Jueves durante el día.</span>
                    </label>
                </div>

                <div id="addressBox" style="display: none; margin-top: 16px;">
                    <input type="text" id="custAddress" placeholder="Busca tu dirección..." class="form-input" autocomplete="off">
                    <p id="addressError" style="color:var(--danger); font-size:11px; display:none; margin-top: -10px; margin-bottom: 10px;"></p>
                    <input type="text" id="custAddressDetails" placeholder="Depto / Casa / Referencia" class="form-input">
                </div>

                <h3 style="font-size:13px; color:var(--accent); text-transform:uppercase; margin-top:24px; margin-bottom:16px; letter-spacing:1px;">2. Tus Datos</h3>
                <input type="text" id="custName" placeholder="Nombre completo" class="form-input">
                <input type="email" id="custEmail" placeholder="Correo electrónico" class="form-input">
                <input type="tel" id="custPhone" placeholder="WhatsApp +569..." class="form-input">
            </div>
        </div>

        <div class="drawer-footer">
            <div id="footer-cart">
                <div style="display:flex; justify-content:space-between; font-weight:700; font-size:20px; margin-bottom:15px;">
                    <span>Total:</span> <span id="cartTotal">$0</span>
                </div>
                <button class="btn-main" onclick="changeStep(2)">Continuar</button>
            </div>
            <div id="footer-checkout" style="display: none;">
                <button onclick="changeStep(1)" style="width: 100%; background: none; border: none; color: #666; font-size: 14px; text-decoration: underline; margin-bottom: 15px; cursor: pointer;">← Editar canasta</button>
                <div style="display:flex; justify-content:space-between; font-weight:700; font-size:22px; margin-bottom:15px;">
                    <span>Total:</span> <span id="checkoutTotal">$0</span>
                </div>
                <button class="btn-main" onclick="procesarPedido()">Pagar ahora</button>
            </div>
        </div>
    </div>

    <script>
        // --- URL DEL SCRIPT V10.1 (PRODUCCION) ---
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw-KsmbHesPgokh690hqRzBJahaR571lE6xnLykhyG22B8jFT-DreAhzWbMqnoJOExxhQ/exec';
        
        let cart = {};
        let deliveryCost = 0;
        let isAddressValid = true;
        let selectedCategory = 'Todos';

        document.addEventListener('contextmenu', e => { if (e.target.closest('.card-img-container')) e.preventDefault(); });

        function initMap() {
            try {
                const input = document.getElementById('custAddress');
                const autocomplete = new google.maps.places.Autocomplete(input, { componentRestrictions: { country: 'cl' }, fields: ['geometry', 'formatted_address'] });
                const plazaLilas = new google.maps.LatLng(-33.433299, -70.598064); 
                autocomplete.addListener('place_changed', () => {
                    const place = autocomplete.getPlace();
                    const errorMsg = document.getElementById('addressError');
                    if (!place.geometry) { errorMsg.innerText = "Selecciona de la lista sugerida."; errorMsg.style.display = 'block'; isAddressValid = false; return; }
                    const dist = google.maps.geometry.spherical.computeDistanceBetween(place.geometry.location, plazaLilas);
                    if (dist > 1500) { errorMsg.innerText = "❌ Fuera del radio de 1.5km."; errorMsg.style.display = 'block'; isAddressValid = false; }
                    else { errorMsg.style.display = 'none'; isAddressValid = true; }
                });
            } catch (e) { console.warn("Maps Error"); }
        }

        async function cargarProductos() {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                const data = await res.json();
                
                // SELECTOR INTELIGENTE: Maneja tanto lista simple como objeto con etiquetas
                const productos = Array.isArray(data) ? data : (data.productos || []);
                
                const categories = ['Todos', ...new Set(productos.filter(p => p.estado !== 'Inactivo').map(p => p.segmento))];
                document.getElementById('categoryFilters').innerHTML = categories.map(cat => `
                    <button class="pill ${cat === 'Todos' ? 'active' : ''}" onclick="filtrarCategoria('${cat}', this)">${cat}</button>
                `).join('');
                renderGrid(productos);
            } catch(e) { 
                console.error("Error cargando productos:", e);
                document.getElementById('productGrid').innerHTML = '<p style="text-align:center; padding:40px;">Error al conectar con el huerto.</p>';
            }
        }

        function renderGrid(productos) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            productos.forEach(p => {
                if (p.estado === 'Inactivo') return;
                const isSoon = p.estado === 'Próximamente';
                const isOut = p.stock <= 0 && !isSoon;
                const lowStock = p.stock > 0 && p.stock <= 10;
                grid.innerHTML += `
                    <div class="card" data-category="${p.segmento}" style="${isOut ? 'filter:grayscale(1); opacity:0.8;' : ''}">
                        <div class="card-img-container">
                            ${isOut ? '<span class="status-badge badge-out">Agotado</span>' : ''}
                            ${isSoon ? '<span class="status-badge badge-soon">Próximamente</span>' : ''}
                            <img src="${p.imagen_url}" class="card-img" alt="${p.nombre}" loading="lazy">
                        </div>
                        <div class="card-body">
                            <div class="card-segment">${p.segmento}</div>
                            <h2 class="card-title">${p.nombre}</h2>
                            ${lowStock && !isSoon ? `<div class="stock-label">⚠️ ¡Solo quedan ${p.stock} unidades!</div>` : ''}
                            <p class="card-desc">${p.descripcion}</p>
                            <div class="card-footer">
                                <strong class="price">$${Number(p.precio).toLocaleString('es-CL')}</strong>
                                ${isSoon ? 
                                    `<button class="btn-add" style="background:#eee; color:#666;" onclick="window.open('https://wa.me/56958799778?text=Me interesa: ${p.nombre}')">Avisarme</button>` :
                                    `<button class="btn-add" onclick="addToCart('${p.id}', '${p.nombre}', ${p.precio}, this)" ${isOut ? 'disabled' : ''}>${isOut ? 'Sin Stock' : 'Agregar'}</button>`
                                }
                            </div>
                        </div>
                    </div>`;
            });
        }

        function filtrarCategoria(cat, btn) {
            selectedCategory = cat;
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            filtrar();
        }

        function filtrar() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                const matchSearch = c.innerText.toLowerCase().includes(q);
                const matchCat = selectedCategory === 'Todos' || c.dataset.category === selectedCategory;
                c.style.display = (matchSearch && matchCat) ? 'flex' : 'none';
            });
        }

        function addToCart(id, name, price, btn) {
            if(cart[id]) cart[id].qty++; else cart[id] = { name, price, qty: 1 };
            const originalText = btn.innerText;
            btn.innerText = "¡Listo! 🌿";
            setTimeout(() => { btn.innerText = originalText; }, 1000);
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cartItemsContainer');
            container.innerHTML = '';
            let subtotal = 0; let count = 0;
            Object.keys(cart).forEach(id => {
                const item = cart[id];
                subtotal += item.price * item.qty;
                count += item.qty;
                container.innerHTML += `
                    <div class="cart-item">
                        <div class="item-info"><h4>${item.name}</h4><p>$${item.price.toLocaleString('es-CL')}</p></div>
                        <div class="item-controls">
                            <button onclick="updateQty('${id}', -1)" class="btn-qty">-</button>
                            <span style="font-weight:600;">${item.qty}</span>
                            <button onclick="updateQty('${id}', 1)" class="btn-qty">+</button>
                        </div>
                    </div>`;
            });
            document.getElementById('cartTotal').innerText = '$' + subtotal.toLocaleString('es-CL');
            document.getElementById('checkoutTotal').innerText = '$' + (subtotal + deliveryCost).toLocaleString('es-CL');
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartCount').style.display = count > 0 ? 'block' : 'none';
        }

        function updateQty(id, change) {
            cart[id].qty += change;
            if(cart[id].qty <= 0) delete cart[id];
            updateCartUI();
        }

        function toggleDrawer() {
            document.getElementById('drawer').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
            if(!document.getElementById('drawer').classList.contains('open')) changeStep(1);
        }

        function changeStep(s) {
            document.getElementById('step-cart').style.display = s === 1 ? 'block' : 'none';
            document.getElementById('footer-cart').style.display = s === 1 ? 'block' : 'none';
            document.getElementById('step-checkout').style.display = s === 2 ? 'block' : 'none';
            document.getElementById('footer-checkout').style.display = s === 2 ? 'block' : 'none';
            document.getElementById('drawerTitle').innerText = s === 1 ? "Tu Canasta" : "Datos de Entrega";
            document.querySelector('.drawer-body').scrollTop = 0;
        }

        function selectDelivery(type, el) {
            document.querySelectorAll('.radio-card').forEach(r => r.classList.remove('selected'));
            el.classList.add('selected');
            deliveryCost = type === 'domicilio' ? 3500 : 0;
            document.getElementById('addressBox').style.display = type === 'domicilio' ? 'block' : 'none';
            isAddressValid = (type !== 'domicilio');
            updateCartUI();
        }

        async function procesarPedido() {
            const btn = document.querySelector('#footer-checkout .btn-main');
            const name = document.getElementById('custName').value.trim();
            const email = document.getElementById('custEmail').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            if(!name || !email || !phone || (deliveryCost > 0 && !isAddressValid)) { alert("Completa tus datos."); return; }

            btn.innerText = "Preparando pago seguro..."; btn.disabled = true;
            
            const addressMain = document.getElementById('custAddress').value.trim();
            const addressExtra = document.getElementById('custAddressDetails').value.trim();
            const deliveryType = document.querySelector('input[name="delivery"]:checked').value;
            
            let logisticaFinal = "Casa Kinder Michelangelo (8:30-9:30)";
            if(deliveryType === 'casona') logisticaFinal = "Casona Waldorf Michelangelo";
            if(deliveryType === 'domicilio') logisticaFinal = "Domicilio (Jueves PM)";

            let resumen = ""; let subtotal = 0;
            Object.keys(cart).forEach(id => {
                resumen += `• ${cart[id].qty}x ${cart[id].name} | `;
                subtotal += (cart[id].price * cart[id].qty);
            });

            const payload = {
                nombre: name, email: email, telefono: phone.replace(/\D/g, ''),
                direccion: deliveryType === 'domicilio' ? `${addressMain}, ${addressExtra}` : logisticaFinal,
                logistica: logisticaFinal,
                total: subtotal + deliveryCost, detalle: resumen
            };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
                const data = await response.json();
                if (data.status === 'success') window.location.href = data.paymentUrl;
                else throw new Error();
            } catch (e) {
                alert("Error al procesar el pedido. Intenta nuevamente.");
                btn.innerText = "Pagar Seguro"; btn.disabled = false;
            }
        }

        cargarProductos();
    </script>
</body>
</html>
