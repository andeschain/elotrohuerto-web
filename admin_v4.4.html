<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin V4.4 | El Otro Huerto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #F9FAF6; --accent: #4A5D23; --text: #1D1D1F; --muted: #6E6E73; --border: #E5E5E1; --success: #27AE60; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: #fff; padding: 48px 32px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 360px; border: 1px solid var(--border); }
        .login-input { width: 100%; padding: 16px; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 16px; text-align: center; font-size: 16px; outline: none; background: #FAFAFA; box-sizing: border-box; }
        .login-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; }
        #admin-content { display: none; padding: 40px 24px; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .kpi-card { background: #fff; padding: 24px; border-radius: 20px; border: 1px solid var(--border); }
        .kpi-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .kpi-value { font-size: 32px; font-weight: 700; color: var(--accent); margin: 8px 0; }
        .main-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 32px; }
        .section-box { background: #fff; border-radius: 24px; padding: 24px; border: 1px solid var(--border); }
        h3 { font-family: 'Lora', serif; font-size: 20px; margin: 0 0 20px 0; color: var(--accent); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 12px; color: var(--muted); border-bottom: 2px solid var(--bg); font-weight: 600; }
        td { padding: 14px 12px; border-bottom: 1px solid #f9f9f9; }
        .picking-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed var(--border); font-size: 13px; }
        .picking-qty { font-weight: 700; color: var(--accent); }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-family:'Lora'">El Otro Huerto</h2>
            <p>Panel Administrativo</p>
            <input type="password" id="pass-field" class="login-input" placeholder="Ingrese Clave Maestra" autofocus>
            <button class="login-btn" onclick="checkAccess()">Ingresar</button>
            <p id="error-msg" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="admin-content">
        <header>
            <div><h1 style="font-family:'Lora'; margin:0;">Huerta de Control</h1><p style="color:var(--muted); font-size: 14px;">Gestión de Pedidos & Cosecha</p></div>
            <button onclick="initDashboard()" style="background:white; border: 1px solid var(--border); padding: 10px 20px; border-radius: 12px; cursor:pointer; font-weight:600;">🔄 Sincronizar Datos</button>
        </header>

        <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-label">Venta Abril (MTD)</div><div class="kpi-value" id="kpi-mtd">$0</div></div>
            <div class="kpi-card"><div class="kpi-label">Venta Últimos 7 Días</div><div class="kpi-value" id="kpi-week">$0</div></div>
            <div class="kpi-card"><div class="kpi-label">Margen Neto (Est.)</div><div class="kpi-value" id="kpi-margin">$0</div></div>
        </div>

        <div class="main-grid">
            <div class="section-box">
                <h3>📦 Registro de Órdenes</h3>
                <div style="overflow-x: auto;"><table id="ordersTable"><thead><tr><th>Fecha</th><th>Cliente</th><th>Venta</th><th>Neto</th><th>Estado</th></tr></thead><tbody></tbody></table></div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 32px;">
                <div class="section-box"><h3>🧺 Picking List de Cosecha</h3><div id="picking-list"></div></div>
                <div class="section-box"><h3>📊 Mix de Productos</h3><canvas id="salesChart"></canvas></div>
            </div>
        </div>
    </div>

<script>
    const _0xkey = "RU9IMjAyNg=="; // EOH2026
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwBWbrfl33BvUHVX8k6tucQyrGl5fjXhMO3dZ57EtL1RCvvHy3BUARCMwdBeyd2GHu_/exec';

    document.getElementById('pass-field').addEventListener('keypress', e => { if (e.key === 'Enter') checkAccess(); });

    function checkAccess() {
        if (btoa(document.getElementById('pass-field').value) === _0xkey) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            initDashboard();
        } else {
            document.getElementById('error-msg').innerText = "⚠️ Clave incorrecta. El huerto está cerrado.";
        }
    }

    async function initDashboard() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getAdminData&t=${Date.now()}`);
            const data = await res.json();
            if (data.pedidos) processData(data.pedidos);
        } catch (e) { alert("Error de conexión"); }
    }

    function processData(pedidos) {
        let mtd = 0, week = 0, margin = 0;
        const now = new Date(), lastWeek = new Date(now.getTime() - 7*24*60*60*1000);
        const tbody = document.querySelector('#ordersTable tbody');
        tbody.innerHTML = ''; const counts = {};

        pedidos.forEach(v => {
            const total = Number(v.total || 0);
            const comision = Number(v.comision_mp || 0);
            const dParts = (v.fecha || "").split(' ')[0].split('/');
            const vDate = dParts.length === 3 ? new Date(dParts[2], dParts[1]-1, dParts[0]) : new Date();

            if (vDate.getMonth() === now.getMonth() && vDate.getFullYear() === now.getFullYear()) mtd += total;
            if (vDate >= lastWeek) week += total;
            margin += (total - comision);

            tbody.innerHTML += `<tr><td>${v.fecha || ''}</td><td><strong>${v.nombre || ''}</strong></td><td>$${total.toLocaleString('es-CL')}</td><td style="color:var(--success)">$${Math.floor(total-comision).toLocaleString('es-CL')}</td><td><span style="font-weight:700; font-size:10px; color:var(--accent)">${v.estado_pago || ''}</span></td></tr>`;

            const matches = (v.detalle || "").match(/(\d+)x ([^|]+)/g);
            if (matches) {
                matches.forEach(m => {
                    const p = m.split('x ');
                    const name = p[1].split('|')[0].trim();
                    counts[name] = (counts[name] || 0) + parseInt(p[0]);
                });
            }
        });

        document.getElementById('kpi-mtd').innerText = `$${mtd.toLocaleString('es-CL')}`;
        document.getElementById('kpi-week').innerText = `$${week.toLocaleString('es-CL')}`;
        document.getElementById('kpi-margin').innerText = `$${Math.floor(margin).toLocaleString('es-CL')}`;
        renderPicking(counts);
    }

    function renderPicking(counts) {
        const container = document.getElementById('picking-list');
        container.innerHTML = '';
        const labels = [], values = [];
        Object.entries(counts).sort((a,b) => b[1]-a[1]).forEach(([n, q]) => {
            container.innerHTML += `<div class="picking-item"><span>${n}</span><span class="picking-qty">${q} un.</span></div>`;
            labels.push(n); values.push(q);
        });
        const ctx = document.getElementById('salesChart').getContext('2d');
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ data: values, backgroundColor: '#4A5D23', borderRadius: 4 }] }, options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { display: false }, ticks: { font: { size: 10 } } } } } });
    }
</script>
</body>
</html>
